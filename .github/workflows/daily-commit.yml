name: Scheduled Daily Commit

on:
  schedule:
    # Runs at 14:30 (2:30 PM) UTC every day. No wildcards for hour/minute!
    - cron: '30 14 * * *'
  workflow_dispatch: # This allows you to trigger it manually right now

permissions:
  contents: write # Crucial: Allows the action to push commits to your repo

jobs:
  make-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required Step: Email included in the step name
      - name: Update log for 24f1002239@ds.study.iitm.ac.in
        run: |
          echo "Automated commit ran on $(date)" >> automated_log.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add automated_log.txt
          git commit -m "Automated daily update via GitHub Actions"
          git push
